<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Shanti Bhavan Alumni Network — The premier platform for alumni to stay connected and give back." />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:;" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  <title>Shanti Bhavan Alumni Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/globals.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/pages.css" />
  <link rel="stylesheet" href="styles/animations.css" />
</head>
<body>
  <!-- App Root -->
  <div id="app">
    <!-- Canvas for particle background -->
    <canvas id="particle-canvas"></canvas>
    
    <!-- App Shell -->
    <div id="app-shell">
      <!-- Navigation (injected by router) -->
      <nav id="main-nav" class="hidden"></nav>
      
      <!-- Page Content -->
      <main id="page-content"></main>
      
      <!-- Toast Notifications -->
      <div id="toast-container"></div>
      
      <!-- Modal Overlay -->
      <div id="modal-overlay" class="hidden">
        <div id="modal-box"></div>
      </div>
      
      <!-- Loading Spinner -->
      <div id="global-loader" class="hidden">
        <div class="loader-ring"></div>
      </div>
    </div>
  </div>

  <!-- App Scripts -->
  <script src="js/store.js"></script>
  <script src="js/security.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/forgot-password.js"></script>
  <script src="js/pages/reset-password.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/feed.js"></script>
  <script src="js/pages/chat.js"></script>
  <script src="js/pages/events.js"></script>
  <script src="js/pages/members.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/pages/admin.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
